<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soma — Patterns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter+Tight:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: var(--text-body);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.page { max-width: 760px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 640px) { .page { padding: 0 16px; } }

.back-link {
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  color: var(--muted);
  text-decoration: none;
  display: inline-block;
  padding: 24px 0 0;
}
.back-link:hover { color: var(--text); }

.patterns-header { padding: 32px 0 8px; }
.patterns-title {
  font-family: var(--font-serif);
  font-size: var(--text-heading);
  font-weight: 500;
  line-height: 1.2;
  margin-bottom: 8px;
}
.patterns-range {
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.patterns-count {
  font-family: var(--font-sans);
  font-size: var(--text-small);
  color: var(--muted);
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

/* Observation cards */
.obs-card {
  padding: 32px 0;
  border-bottom: 1px solid var(--border);
}
.obs-card:last-child { border-bottom: none; padding-bottom: 64px; }
.obs-headline {
  font-family: var(--font-serif);
  font-size: var(--text-body);
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 20px;
  max-width: 55ch;
}
.obs-chart {
  margin-bottom: 16px;
  overflow: visible;
}
.obs-chart svg { display: block; width: 100%; height: 200px; }
.obs-context {
  font-family: var(--font-sans);
  font-size: var(--text-small);
  color: var(--text);
  line-height: 1.6;
  max-width: 60ch;
  margin-bottom: 12px;
}
.obs-confidence-link {
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  color: var(--muted);
  background: none;
  border: none;
  padding: 0;
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
.obs-confidence-link:hover { color: var(--text); }
.obs-stat-basis {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 300ms ease, opacity 200ms ease, margin 200ms ease;
  margin-top: 0;
}
.obs-stat-basis.visible {
  max-height: 80px;
  opacity: 1;
  margin-top: 8px;
}
.obs-stat-text {
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  color: var(--muted);
  line-height: 1.5;
}

.obs-empty {
  padding: 64px 0;
  text-align: center;
  font-family: var(--font-sans);
  font-size: var(--text-body);
  color: var(--muted);
  font-style: italic;
}

.loading {
  padding: 64px 0;
  text-align: center;
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="back-link">&larr; Back to today</a>
  <div class="patterns-header">
    <div class="patterns-title">Patterns from your last 28 days</div>
    <div class="patterns-range" id="patterns-range"></div>
    <div class="patterns-count" id="patterns-count"></div>
  </div>
  <div id="observations">
    <div class="loading">Analyzing your data&hellip;</div>
  </div>
</div>

<script>
/* ── Helpers ── */
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function shortDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.getDate() + '/' + (d.getMonth() + 1);
}

/* ── Chart renderers ── */
function renderBarChart(points, baseline) {
  const W = 696, H = 200, PAD_T = 24, PAD_B = 28, PAD_L = 4, PAD_R = 4;
  const chartH = H - PAD_T - PAD_B;
  const n = points.length;
  const barW = Math.min(48, (W - PAD_L - PAD_R) / n * 0.6);
  const gap = (W - PAD_L - PAD_R - barW * n) / (n + 1);

  const vals = points.map(p => p.value).filter(v => v != null);
  const min = Math.min(...vals) - 3;
  const max = Math.max(...vals) + 2;
  const range = max - min || 1;
  const y = v => PAD_T + (max - v) * chartH / range;
  const baseY = y(baseline);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Baseline
  svg += `<line x1="${PAD_L}" y1="${baseY}" x2="${W - PAD_R}" y2="${baseY}" style="stroke:var(--muted);stroke-width:1;stroke-dasharray:3 3;opacity:0.3"/>`;

  points.forEach((p, i) => {
    const x = PAD_L + gap + i * (barW + gap);
    if (p.value != null) {
      const barY = y(p.value);
      const barH = Math.max(1, baseY - barY);
      const above = p.value >= baseline;
      const fillColor = above ? 'var(--muted)' : 'var(--accent)';
      const yStart = above ? barY : baseY;
      const h = Math.abs(baseY - barY);
      svg += `<rect x="${x}" y="${yStart}" width="${barW}" height="${h}" rx="2" style="fill:${fillColor};opacity:0.5"/>`;
      // Value label
      const labelY = above ? barY - 6 : yStart + h + 14;
      svg += `<text x="${x + barW / 2}" y="${labelY}" text-anchor="middle" style="font-family:var(--font-mono);font-size:10px;fill:var(--text)">${p.value}</text>`;
    }
    // Day label
    svg += `<text x="${x + barW / 2}" y="${H - 6}" text-anchor="middle" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted);letter-spacing:0.04em">${p.label}</text>`;
  });

  svg += '</svg>';
  return svg;
}

function renderTrendChart(points, baseline) {
  const W = 696, H = 200, PAD_T = 16, PAD_B = 28, PAD_L = 8, PAD_R = 8;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  const vals = points.map(p => p.value).filter(v => v != null);
  const min = Math.min(...vals) - 2;
  const max = Math.max(...vals) + 2;
  const range = max - min || 1;

  const x = i => PAD_L + i * chartW / (points.length - 1);
  const y = v => PAD_T + (max - v) * chartH / range;
  const baseY = y(baseline);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Baseline
  svg += `<line x1="${PAD_L}" y1="${baseY}" x2="${W - PAD_R}" y2="${baseY}" style="stroke:var(--muted);stroke-width:1;stroke-dasharray:3 3;opacity:0.3"/>`;
  // Baseline label
  svg += `<text x="${W - PAD_R}" y="${baseY - 5}" text-anchor="end" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted);opacity:0.5">avg ${baseline}</text>`;

  // Line
  const pathPts = points.map((p, i) => p.value != null ? `${i === 0 || points[i-1].value == null ? 'M' : 'L'}${x(i).toFixed(1)},${y(p.value).toFixed(1)}` : '').filter(Boolean).join(' ');
  svg += `<path d="${pathPts}" style="stroke:var(--muted);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round"/>`;

  // Dots
  points.forEach((p, i) => {
    if (p.value == null) return;
    const isLast = i === points.length - 1;
    const r = isLast ? 3.5 : 2;
    const fill = isLast ? 'var(--accent)' : 'var(--muted)';
    const opacity = isLast ? '1' : '0.4';
    svg += `<circle cx="${x(i).toFixed(1)}" cy="${y(p.value).toFixed(1)}" r="${r}" style="fill:${fill};opacity:${opacity}"/>`;
  });

  // Date labels (first, mid, last)
  const labelIndices = [0, Math.floor(points.length / 2), points.length - 1];
  labelIndices.forEach(i => {
    const p = points[i];
    const label = p.date ? shortDate(p.date) : '';
    svg += `<text x="${x(i).toFixed(1)}" y="${H - 6}" text-anchor="middle" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted)">${label}</text>`;
  });

  svg += '</svg>';
  return svg;
}

function renderScatterChart(points, baseline) {
  const W = 696, H = 200, PAD_T = 16, PAD_B = 28, PAD_L = 40, PAD_R = 16;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  const steps = points.map(p => p.steps).filter(v => v != null);
  const readiness = points.map(p => p.readiness).filter(v => v != null);
  const sMin = Math.min(...steps), sMax = Math.max(...steps);
  const rMin = Math.min(...readiness) - 2, rMax = Math.max(...readiness) + 2;
  const sRange = sMax - sMin || 1;
  const rRange = rMax - rMin || 1;

  const x = s => PAD_L + (s - sMin) * chartW / sRange;
  const y = r => PAD_T + (rMax - r) * chartH / rRange;
  const baseY = y(baseline);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Baseline
  svg += `<line x1="${PAD_L}" y1="${baseY}" x2="${W - PAD_R}" y2="${baseY}" style="stroke:var(--muted);stroke-width:1;stroke-dasharray:3 3;opacity:0.3"/>`;

  // Y-axis labels
  svg += `<text x="${PAD_L - 6}" y="${y(rMax) + 4}" text-anchor="end" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted)">${Math.round(rMax)}</text>`;
  svg += `<text x="${PAD_L - 6}" y="${y(rMin) + 4}" text-anchor="end" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted)">${Math.round(rMin)}</text>`;

  // X-axis labels
  svg += `<text x="${x(sMin)}" y="${H - 6}" text-anchor="start" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted)">${(sMin/1000).toFixed(0)}k</text>`;
  svg += `<text x="${x(sMax)}" y="${H - 6}" text-anchor="end" style="font-family:var(--font-mono);font-size:9px;fill:var(--muted)">${(sMax/1000).toFixed(0)}k steps</text>`;

  // Dots
  points.forEach((p, i) => {
    if (p.steps == null || p.readiness == null) return;
    const isBelow = p.readiness < baseline;
    svg += `<circle cx="${x(p.steps).toFixed(1)}" cy="${y(p.readiness).toFixed(1)}" r="4" style="fill:${isBelow ? 'var(--accent)' : 'var(--muted)'};opacity:0.5"/>`;
  });

  svg += '</svg>';
  return svg;
}

/* ── Render ── */
function renderChart(obs) {
  if (obs.chart_type === 'bar') return renderBarChart(obs.chart_data, obs.baseline);
  if (obs.chart_type === 'scatter') return renderScatterChart(obs.chart_data, obs.baseline);
  return renderTrendChart(obs.chart_data, obs.baseline);
}

function renderObservation(obs) {
  const card = document.createElement('div');
  card.className = 'obs-card';

  const headline = document.createElement('div');
  headline.className = 'obs-headline';
  headline.textContent = obs.headline;
  card.appendChild(headline);

  const chart = document.createElement('div');
  chart.className = 'obs-chart';
  chart.innerHTML = renderChart(obs);
  card.appendChild(chart);

  const context = document.createElement('div');
  context.className = 'obs-context';
  context.textContent = obs.context;
  card.appendChild(context);

  const confLink = document.createElement('button');
  confLink.className = 'obs-confidence-link';
  confLink.textContent = `How confident? ${obs.confidence}`;
  card.appendChild(confLink);

  const statBasis = document.createElement('div');
  statBasis.className = 'obs-stat-basis';
  const statText = document.createElement('div');
  statText.className = 'obs-stat-text';
  statText.textContent = obs.stat_basis;
  statBasis.appendChild(statText);
  card.appendChild(statBasis);

  confLink.addEventListener('click', () => {
    const opening = !statBasis.classList.contains('visible');
    statBasis.classList.toggle('visible', opening);
    confLink.textContent = opening
      ? `Hide basis`
      : `How confident? ${obs.confidence}`;
  });

  return card;
}

/* ── Load ── */
async function loadPatterns() {
  try {
    const res = await fetch('/api/patterns');
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();

    // Header
    if (data.date_range) {
      document.getElementById('patterns-range').textContent =
        formatDate(data.date_range.start) + ' – ' + formatDate(data.date_range.end) +
        ' · ' + data.days_analyzed + ' days';
    }

    const container = document.getElementById('observations');
    container.innerHTML = '';

    if (!data.observations || data.observations.length === 0) {
      container.innerHTML = '<div class="obs-empty">Not enough data yet. Patterns appear after 7+ days of consistent wear.</div>';
      document.getElementById('patterns-count').textContent = 'No patterns detected yet.';
      return;
    }

    document.getElementById('patterns-count').textContent =
      data.observations.length + ' observation' + (data.observations.length !== 1 ? 's' : '') +
      ' passed confidence thresholds.';

    data.observations.forEach(obs => {
      container.appendChild(renderObservation(obs));
    });
  } catch (e) {
    document.getElementById('observations').innerHTML =
      '<div class="obs-empty">Could not load patterns. Try again later.</div>';
  }
}

loadPatterns();
</script>
</body>
</html>
